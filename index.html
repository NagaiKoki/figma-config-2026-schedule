<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15171c; --ink-soft:#5a5f6b; --paper:#f4f5f7;
    --card:#ffffff; --line:#dfe2e8; --grid:#e9ebef;
    --main:#6d28d9; --mezzanine:#d63b46; --level2:#0f8a6b;
    --maker:#d9730d; --community:#c026a6; --labs:#2563eb; --venue:#6b7280;
    --u:16px; --timew:54px; --maxw:1320px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;line-height:1.45;padding-bottom:40px}

  .masthead{max-width:var(--maxw);margin:0 auto;padding:48px 20px 18px}
  .masthead-top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:0 0 12px}
  .lang-toggle{font-family:"Space Mono",monospace;font-size:11.5px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer;
    color:var(--ink);display:inline-flex;align-items:center;gap:8px;flex:none}
  .lang-toggle:hover{border-color:var(--ink)}
  .lang-toggle .opt{opacity:.38}
  .lang-toggle .opt.on{opacity:1;color:var(--main)}
  .lang-toggle .sep{opacity:.4}
  .eyebrow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--main);margin:0}
  .masthead h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;
    font-size:clamp(34px,7vw,72px);line-height:.96;letter-spacing:-.02em;margin:0 0 14px}
  .masthead h1 em{font-style:normal;color:var(--main)}
  .sub{font-size:15px;color:var(--ink-soft);max-width:62ch;margin:0}
  .sub b{color:var(--ink);font-weight:600}

  .legend{max-width:var(--maxw);margin:18px auto 0;padding:0 20px;
    display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .legend .hint{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-soft);margin-right:2px}
  .chip{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-family:"Inter",sans-serif;font-size:12.5px;font-weight:600;padding:5px 11px 5px 9px;
    border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:var(--c);flex:none}
  .chip .count{opacity:.7;font-weight:500;margin-left:2px;font-variant-numeric:tabular-nums}
  .chip[aria-pressed="false"]{opacity:.32;text-decoration:line-through}
  .chip:hover{border-color:var(--ink)}

  .day{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .day-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    margin:42px 0 12px;padding-bottom:11px;border-bottom:2px solid var(--ink)}
  .day-date{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:30px;letter-spacing:-.015em}
  .day-dow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--main);align-self:center}
  .day-meta{margin-left:auto;font-size:12px;color:var(--ink-soft);
    font-family:"Space Mono",monospace}

  .preshow{display:flex;flex-wrap:wrap;gap:10px}
  .pre-card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--venue);
    border-radius:12px;padding:13px 15px;flex:1 1 230px;min-width:200px;cursor:pointer}
  .pre-card .pt{font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft)}
  .pre-card h3{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:16px;margin:4px 0 2px}
  .pre-card p{margin:0;font-size:12.5px;color:var(--ink-soft)}

  .tt-wrap{border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden}
  .tt{display:grid;position:relative}
  .tt-h{position:sticky;top:0;z-index:6;background:var(--card);
    font-family:"Space Mono",monospace;font-size:10px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;text-align:center;padding:9px 3px;border-bottom:1px solid var(--line)}
  .tt-h .bar{display:block;height:3px;border-radius:2px;background:var(--c);margin:0 auto 5px;width:24px}
  .tt-h.time-h{z-index:7;color:var(--ink-soft);text-align:left;padding-left:8px}

  .hourline{grid-column:1 / -1;border-top:1px solid var(--grid);z-index:0;pointer-events:none}
  .hourlabel{grid-column:1;z-index:3;background:var(--card);
    font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--ink-soft);
    padding:2px 6px 0 8px;border-right:1px solid var(--line)}
  .timefill{grid-column:1;z-index:2;background:var(--card);border-right:1px solid var(--line)}

  .ev{z-index:1;margin:2px;border-radius:8px;background:var(--card);
    border:1px solid var(--line);border-left:3px solid var(--c);
    padding:5px 7px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;gap:1px;
    position:relative;transition:transform .08s,box-shadow .12s}
  .ev:hover{box-shadow:0 3px 12px rgba(0,0,0,.13);transform:translateY(-1px);z-index:4}
  .ev .going-mark{position:absolute;top:2px;right:5px;font-size:11px;line-height:1;
    color:#f59e0b;pointer-events:none;text-shadow:0 0 2px rgba(255,255,255,.95)}
  .ev.key .going-mark{color:#fbbf24;text-shadow:none;font-size:13px;top:6px;right:10px}
  .ev.going{box-shadow:inset 0 0 0 1.5px #f59e0b}
  .ev .etime{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;
    letter-spacing:.02em;color:var(--ink);line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev .eorg{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;
    letter-spacing:.02em;color:var(--c);text-transform:uppercase;line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev h3{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:12px;line-height:1.13;letter-spacing:-.005em;margin:0;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  .ev.key{background:var(--main);border:none;color:#fff;padding:9px 13px;justify-content:center}
  .ev.key .etime{color:rgba(255,255,255,.9);font-size:11px}
  .ev.key .eorg{color:rgba(255,255,255,.82)}
  .ev.key h3{font-size:17px;-webkit-line-clamp:2}
  .ev.venue{background:#eef0f2;border-left-color:var(--venue)}
  .ev.venue.key{background:#5b6470}

  /* ---------- Bottom sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(15,17,23,.46);opacity:0;visibility:hidden;
    transition:opacity .2s,visibility .2s;z-index:90}
  .scrim.open{opacity:1;visibility:visible}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:100;background:var(--card);
    border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.25);
    max-height:80vh;overflow-y:auto;transform:translateY(101%);
    transition:transform .26s cubic-bezier(.32,.72,0,1);padding:0 22px 30px}
  .sheet.open{transform:translateY(0)}
  .sheet-grip{position:sticky;top:0;background:var(--card);padding:11px 0 4px;display:flex;justify-content:center}
  .sheet-grip::before{content:"";width:38px;height:4px;border-radius:3px;background:var(--line)}
  .sheet-close{position:absolute;top:12px;right:16px;border:none;background:#eef0f2;color:var(--ink);
    width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;line-height:1}
  .sheet .s-stage{display:inline-flex;align-items:center;gap:7px;font-family:"Space Mono",monospace;
    font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c);margin:4px 0 2px}
  .sheet .s-stage .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .sheet .s-time{font-family:"Space Mono",monospace;font-size:13px;color:var(--ink-soft);margin:0 0 10px}
  .sheet h2{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:25px;
    line-height:1.1;letter-spacing:-.015em;margin:0 0 14px}
  .s-tags{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 18px}
  .s-tags span{font-size:11.5px;color:var(--ink-soft);border:1px solid var(--line);
    border-radius:6px;padding:2px 8px}
  .s-tags .theme{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}
  .s-sec{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-soft);margin:0 0 8px;padding-top:6px;border-top:1px solid var(--line)}
  .spk{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px}
  .spk .av{width:34px;height:34px;border-radius:50%;flex:none;background:var(--c);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
    font-family:"Bricolage Grotesque",sans-serif}
  .spk .nm{font-weight:600;font-size:14.5px;line-height:1.2}
  .spk .rl{font-size:12.5px;color:var(--ink-soft);line-height:1.25}
  .spk .rl b{color:var(--ink);font-weight:600}
  .s-summary-label{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-soft);margin:2px 0 7px;padding-top:8px;border-top:1px solid var(--line)}
  .s-desc{font-size:14.5px;line-height:1.62;color:var(--ink);margin:0 0 18px}
  .s-note{font-size:12.5px;color:var(--ink-soft);margin:8px 0 16px;line-height:1.5}
  .s-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
    font-family:"Inter",sans-serif;font-weight:600;font-size:14px;color:#fff;
    background:var(--c);border-radius:999px;padding:11px 19px;text-decoration:none}
  .s-link:hover{filter:brightness(.93)}
  .s-going{display:inline-flex;align-items:center;gap:7px;
    font-family:"Inter",sans-serif;font-weight:600;font-size:13.5px;
    background:var(--card);border:1.5px solid var(--line);color:var(--ink);
    border-radius:999px;padding:9px 17px;cursor:pointer;margin:2px 0 14px;
    transition:background .15s,border-color .15s,color .15s}
  .s-going:hover{border-color:var(--ink)}
  .s-going .star{font-size:14px;line-height:1}
  .s-going.on{background:#fff7ed;border-color:#f59e0b;color:#b45309}
  .s-going.on .star{color:#f59e0b}

  .footnote{max-width:var(--maxw);margin:30px auto 0;padding:0 20px;font-size:11.5px;
    color:var(--ink-soft);font-family:"Space Mono",monospace}
  .footnote + .footnote{margin-top:4px}
  .footnote a{color:inherit;text-decoration:underline;text-decoration-thickness:1px;
    text-underline-offset:2px}
  .footnote a:hover{color:var(--ink)}
  .toolbar{position:fixed;right:18px;bottom:18px;z-index:50}
  .btn{font-family:"Inter",sans-serif;font-weight:600;font-size:14px;background:var(--ink);
    color:#fff;border:none;border-radius:999px;padding:11px 19px;cursor:pointer;
    box-shadow:0 6px 22px rgba(0,0,0,.22)}
  .btn:hover{background:var(--main)}

  @media (max-width:600px){
    :root{--timew:40px;--u:17px}
    .ev{padding:4px 5px;border-left-width:3px}
    .ev h3{font-size:10.5px;-webkit-line-clamp:2}
    .ev .etime,.ev .eorg{font-size:8.5px}
    .ev.key h3{font-size:14px}
    .tt-h{font-size:8.5px;padding:7px 1px}
    .tt-h .bar{width:16px}
    .sheet h2{font-size:21px}
  }
  @media (prefers-reduced-motion:reduce){
    .sheet{transition:none}.scrim{transition:none}.ev{transition:none}
  }
  @media print{
    :root{--paper:#fff;--u:13px}
    body{padding:0;background:#fff}
    .toolbar,.legend,.btn,.scrim,.sheet{display:none!important}
    .masthead{padding:18px 12px 4px}
    .day{padding:0 10px;page-break-before:always}
    .day:first-of-type{page-break-before:avoid}
    .tt-h{position:static}.ev,.tt{break-inside:avoid}.ev{cursor:default}
  }
</style>
</head>
<body>
  <header class="masthead">
    <div class="masthead-top">
      <p class="eyebrow" data-i18n="eyebrow">Figma · San Francisco · Moscone</p>
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">
        <span class="opt" data-opt="en">EN</span>
        <span class="sep">/</span>
        <span class="opt" data-opt="ja">日本語</span>
      </button>
    </div>
    <h1 data-i18n-html="title">Config 2026<br><em>Agenda Timetable</em></h1>
    <p class="sub" data-i18n-html="sub"></p>
  </header>
  <nav class="legend" id="legend"><span class="hint" data-i18n="stageHint">Stage</span></nav>
  <main id="app"></main>
  <p class="footnote" data-i18n="footnote">Source: config.figma.com/san-francisco/agenda · Times in PDT</p>
  <p class="footnote" data-i18n="disclaimer">Unofficial fan-made companion. Not affiliated with or endorsed by Figma.</p>
  <p class="footnote">Hosted by <a href="https://github.com/NagaiKoki/figma-config-2026-schedule" target="_blank" rel="noopener">github.com/NagaiKoki/figma-config-2026-schedule</a></p>
  <div class="toolbar"><button class="btn" id="printBtn" onclick="window.print()" data-i18n="printBtn">PDF / Print</button></div>

  <div class="scrim" id="scrim"></div>
  <div class="sheet" id="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
    <div class="sheet-grip"></div>
    <button class="sheet-close" id="sheetClose" data-i18n-aria="closeAria" aria-label="Close">×</button>
    <div id="sheetBody"></div>
  </div>

<script>
const STAGES={
  main:{label:"Main",v:"--main"}, mezzanine:{label:"Mezzanine",v:"--mezzanine"},
  level2:{label:"Level 2",v:"--level2"}, maker:{label:"Maker",v:"--maker"},
  community:{label:"Community",v:"--community"}, labs:{label:"Learning Labs",v:"--labs"},
  venue:{label:"Venue",v:"--venue"},
};
const ORDER=["main","mezzanine","level2","maker","community","labs"];

let lang = (localStorage.getItem("lang") === "ja") ? "ja" : "en";
const I18N = {
  en: {
    docTitle: "Config 2026 — Agenda Timetable",
    eyebrow: "Figma · San Francisco · Moscone",
    title: "Config 2026<br><em>Agenda Timetable</em>",
    sub: "Vertical = <b>time</b>, horizontal = <b>stage</b>. Overlapping sessions sit side by side. Each block shows the <b>company</b>. <b>Tap</b> any session for speakers and details. All times in <b>PDT</b>.",
    stageHint: "Stage",
    footnote: "Source: config.figma.com/san-francisco/agenda · Times in PDT",
    disclaimer: "Unofficial fan-made companion. Not affiliated with or endorsed by Figma.",
    printBtn: "PDF / Print",
    closeAria: "Close",
    preDow: "Tue · Pre-show",
    eventsCount: n => `${n} events`,
    sessionsCount: n => `${n} sessions`,
    summaryLabel: "Summary (paraphrased)",
    speakersLabel: "Speakers",
    noSummary: "No summary written yet for this session. Tap the link below for the official description.",
    officialLink: "View official page ↗",
    stageSuffix: " stage",
    mineLabel: "My schedule",
    addToMine: "Add to my schedule",
    inMine: "In my schedule",
  },
  ja: {
    docTitle: "Config 2026 — アジェンダ・タイムテーブル",
    eyebrow: "Figma · San Francisco · Moscone",
    title: "Config 2026<br><em>アジェンダ・タイムテーブル</em>",
    sub: "縦が<b>時間軸</b>、横が<b>会場</b>。重なる時間帯のセッションは横に並びます。各ブロックには<b>会社名</b>を表示。<b>タップ</b>すると登壇者や詳細が出ます。時刻はすべて <b>PDT</b>。",
    stageHint: "Stage",
    footnote: "Source: config.figma.com/san-francisco/agenda · Times in PDT",
    disclaimer: "非公式・ファンメイドのコンパニオンページです。Figma の公認サイトではありません。",
    printBtn: "PDF / 印刷",
    closeAria: "閉じる",
    preDow: "Tue · Pre-show",
    eventsCount: n => `${n} events`,
    sessionsCount: n => `${n} sessions`,
    summaryLabel: "概要（要約）",
    speakersLabel: "Speakers",
    noSummary: "このセッションの概要はまだ要約していません。下のリンクから公式の説明をご覧ください。",
    officialLink: "公式ページで詳細を見る ↗",
    stageSuffix: " stage",
    mineLabel: "見にいく",
    addToMine: "見にいくに追加",
    inMine: "見にいく登録済み",
  },
};
const t = (k, ...args) => {
  const v = I18N[lang][k];
  return typeof v === "function" ? v(...args) : v;
};

const cv=k=>`var(${(STAGES[k]||STAGES.venue).v})`;
function fmt(min){let h=Math.floor(min/60),m=min%60;const ap=h>=12?"PM":"AM";
  let hh=h%12;if(hh===0)hh=12;return `${hh}:${String(m).padStart(2,"0")} ${ap}`;}
function fmtRange(s,e){
  const fa=fmt(s),fb=fmt(e);
  const pa=fa.slice(-2),pb=fb.slice(-2);
  return pa===pb ? `${fa.slice(0,-3)}–${fb.slice(0,-3)} ${pb}` : `${fa}–${fb}`;
}
const initials=n=>n.replace(/[^A-Za-z ]/g,"").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase();

const PRESHOW=[
  {t:"9:00 AM – 7:00 PM",title:"Badge pickup",org:"Moscone North",stage:"venue",
   desc:"Config バッジの受け取り。政府発行の身分証が必要。",
   descEn:"Pick up your Config badge. Government-issued photo ID required."},
  {t:"12:00 – 7:00 PM",title:"Config Commons",org:"Config Commons",stage:"venue",
   desc:"Moscone 外のブロックを使ったコミュニティ・ハングアウト。バッジ受取・スワッグ・交流。",
   descEn:"Community hangout on the block outside Moscone. Badge pickup, swag, and mingling."},
  {t:"2:00 – 2:30 PM",title:"Config Makeathon Winners Showcase",org:"Figma × Contra",stage:"venue",
   desc:"$100k の賞金がどのチーム／プロジェクトに渡るかを発表。Community Stage（屋外）。",
   descEn:"Announcement of which team / project takes the $100k prize. Community Stage (outdoor)."},
];

const DAYS=[
 {date:"June 24",dow:"Wed · Day 1",start:540,end:1020,sessions:[
  {s:540,e:620,stage:"main",key:1,title:"Opening keynote — Figma product launch",org:"Figma",theme:"Keynote",topics:[],
   spk:[{n:"Dylan Field",r:"CEO & Co-founder, <b>Figma</b>"},{n:"Jayse Hansen",r:"Fictional UI Design Director, <b>ØFFGRID</b>"}]},
  {s:635,e:655,stage:"main",key:1,title:"The rules are the art: creating with AI",org:"Herndon Dryhurst Studio",theme:"Keynote",topics:["AI","Workflows"],
   spk:[{n:"Holly Herndon",r:"Artist, <b>Herndon Dryhurst Studio</b>"}]},
  {s:660,e:705,stage:"labs",title:"Lab: design to development workflows",org:"Figma",theme:"Process",topics:["Dev and code","Workflows","Beginner"],
   spk:[{n:"Amy Lima",r:"Designer Advocate, <b>Figma</b>"},{n:"Riccardo Erra",r:"Developer Advocate, <b>Figma</b>"}]},
  {s:670,e:730,stage:"main",title:"Figma deep dive",org:"Figma",theme:"Figma deep dive",topics:[],
   spk:[{n:"Daniela Muntyan",r:"Product Designer, <b>Figma</b>"},{n:"Luca Damasco",r:"Manager, Software Engineering, <b>Figma</b>"},{n:"Dave Hornsby",r:"Product Manager, <b>Figma</b>"}]},
  {s:670,e:690,stage:"level2",title:"Scooter, screen and duct-tape: from hack to habit",org:"Ather Energy",theme:"Process",topics:["Hardware","Prototyping"],

 "From kickoff to canvas: connecting Google Workspace and Figma":{u:"ee548465-66ff-48ed-a86b-ee55e0be22f2",d:"（公式で詳細は後日公開）Google Workspace と Figma をつなぐワークフローのセッション。",de:"(Official details forthcoming.) A session on workflows that connect Google Workspace and Figma."},
 "Dimensional shift: sculpting in Figma Draw":{u:"274b9aeb-8c3a-49b2-b241-325ec5b50487",d:"スランプを新しい道具（Figma Draw）で乗り越えた話。2Dベクターで3Dの奥行きを出す手法と、初心者に戻ることの効用。",de:"Climbing out of a creative slump with a new tool (Figma Draw). Techniques for giving 2D vectors a 3D feel — and the value of being a beginner again."},
 "Beyond design systems: designing for robots and seniors":{u:"979a7614-45e1-43a4-82d6-a0e2ef8cbed8",d:"高齢者ケア用のロボットを設計。患者や看護師と Figma の試作で検証し、あえてクマの顔に。デザインは部品ではなく「つながり」だという主張。",de:"Designing a senior-care robot. Tested with patients and nurses through Figma prototypes — and intentionally ended up with a bear's face. Argues design is connection, not parts."},
 "How to build content systems for AI product workflows":{u:"520fcaa6-76e0-4703-89b0-9f4dfb9a91de",d:"誰もがコピーを量産する時代に、ガイドラインから一貫した文言を生成し逸脱を検知する「コピーの真実源」を Figma Make と Ditto で組むワークショップ。",de:"In an era where everyone churns out copy, build a 'source of truth' that generates consistent strings from your guidelines and flags drift. Workshop with Figma Make + Ditto."},
 "Figma meets hardware: prototyping for the physical world":{u:"93485c8d-f1b1-45b3-bdca-a24e0c0bd94c",d:"Figma で家電を設計。市販の電子部品で「Figma Displays」を作り、試作を実機画面に投影。フィードバックを6か月から2分に短縮した手法。",de:"Designing home appliances in Figma. Built 'Figma Displays' from off-the-shelf electronics so prototypes show up on real device screens — collapsing feedback loops from six months to two minutes."},
 "Out of sync, on purpose: desktop design after mobile won":{u:"eb8fbae1-7cdf-420c-bfbe-cd676fccd1d0",d:"Spotify デスクトップ版の設計。モバイルを1:1で写さず、集中・没入というデスクトップの強みに合わせて作り込む小さなチームの工夫。",de:"Designing Spotify for desktop. Instead of mirroring mobile 1:1, a small team leans into desktop's strengths — focus and immersion — and tailors the experience accordingly."},
 "Lab: the many ways to make with Figma Make":{u:"ec2fc49f-9d34-46c8-9086-8887cab3bef2",d:"Figma Make の使いどころを横断的に学ぶラボ。新規プロトタイプ制作から既存コードベースとの統合まで、デザインシステム連携と効果的なコンテキストの渡し方を紹介。",de:"Learn various approaches to building with Figma Make, from creating new prototypes or integrating with existing codebases, including best practices for design systems and effective context provision."},
 "Writing for humans in an AI world":{u:"47d280de-e85a-4e10-b6e6-b97734490e9f",d:"Anthropic のコンテンツデザインは、Claude の返答ではなくその周辺（プロンプト例・UI文言・名称・ボイス）を設計する。自然言語UIで変わる文章設計の話。",de:"At Anthropic, content design isn't about Claude's replies — it's about everything around them: prompt examples, UI copy, naming, and voice. How writing changes when the interface itself is natural language."},
 "Be the director: how stage craft informs product craft":{u:"8f2835f5-9701-4834-9237-0621882953fa",d:"舞台の演出家のように考える。意図的な選択をし、脚本の譲れない点を定め、プロダクトの背骨を見つける。",de:"Think like a stage director. Make intentional choices, define the script's non-negotiables, and find your product's spine."},
 "From concept to confidence with Dscout AI":{u:"a9ed6f89-a852-48bf-9f6c-245dab895b87",d:"Dscout の AI リサーチプラットフォームを使い、アイデア出しから検証までを高速化する話。スピードと品質を両立しながら、コストの高い手戻りを減らす方法を扱う。",de:"This session explores how Dscout's AI-powered research platform accelerates product development from ideation through testing, enabling teams to validate concepts quickly while maintaining quality and reducing costly mistakes."},
 "Skill issue: how we built an OS for PMs at Figma":{u:"5d27f158-dd26-4f34-b7e0-991224db8b7a",d:"Figma の PM チームが、運用作業を減らして戦略的判断に時間を使えるよう AI ツール「PM OS」を内製した話。有志チームでの実験的開発から、日常業務に組み込むまでの過程を共有する。",de:"Figma created PM OS, an AI-powered tool that helps product managers reduce administrative work and focus on strategic decisions. The talk shares how a volunteer team built this system through experimentation and its adoption into daily PM workflows."},
 "Designing the product that can do anything":{u:"ac133b2f-2b12-42b3-8cbc-d9c27e0c1195",d:"何でもできてしまうヒューマノイドロボットのインターフェース設計という難題。Boston Dynamics の取り組みから、スキル開発・タスク作成 UI・自動化工場での性能監視まで横断的に扱う。",de:"This session explores the UX design challenges of creating interfaces for humanoid robots that can perform diverse tasks, covering robot skill development, task behavior authoring interfaces, and facility integration for monitoring robot performance in automated factories."},
 "Lab: bringing designs to life":{u:"a9724310-a83e-4b29-90b4-cce61cfa3ea6",d:"プロダクト体験をより動的にするための新機能を紹介するラボ。詳細は Opening Keynote で明かされるが、ここで実際に手を動かして使い方を覚えられる。",de:"This session introduces new Figma features designed to enhance product experiences with more dynamic interactions. Participants will learn how to get started with these capabilities, with full details revealed during the opening keynote."},
 "Prompts to fashion: AI-powered 3D-printed garments":{u:"349f94c6-628e-40ff-9f90-119750e60bfa",d:"Danit Peleg が、縫製パターンを持続可能素材の 3D プリント生地に変換する AI ワークフローを実演。Figma Weave で作った 3 着をライブで初公開し、廃棄ゼロ・オンデマンドのデジタルファッション制作を見せる。",de:"Danit Peleg demonstrates an AI-powered workflow that transforms sewing patterns into 3D-printable textiles using sustainable materials, featuring a live reveal of three designs created with Figma Weave that showcase zero-waste, on-demand digital fashion production."},
 "Hacking AI for creative operations at scale":{u:"e49d78e2-a2ff-4b10-98bc-47bd6cec2d48",d:"AI を単なるアセット生成器で終わらせず、上流のシステム・ワークフロー・判断ロジックそのものを最適化する話。Rory Flynn が分解／システムプロンプト／ワークフロー構築の 3 スキルを Figma Weave で実演し、大手コンシューマーテック企業での実装事例を共有する。",de:"This session explores how creative teams can leverage AI beyond asset generation by optimizing upstream systems, workflows, and decision logic. Rory Flynn demonstrates three essential skills—deconstruction, system prompts, and workflow building—using Figma Weave, drawing insights from real-world deployment at a major consumer tech brand."},
 "Lab: unlocking speed and visual expression":{u:"6122f91d-d899-4a5a-b542-549b1ffd31ba",d:"Figma のツールを使って、デザインワークフローに視覚表現・一貫性・スピードを取り込むテクニックを学ぶ。終了後にネットワーキングの時間あり。",de:"Discover techniques for enhancing your design workflow by incorporating visual expression, consistency, and speed using Figma's tools, with networking opportunities afterward."},
 "The most important component: community":{u:"b8b2cb7e-706f-4d96-aa85-24c40ab6c9d9",d:"AI が制作プロセスに入り込むほど、コミュニティと人とのつながりこそが作品を「その人らしく」する核になる、という話。Figma がコラボレーションと共有視点を中心に据えたツール作りについて語る。",de:"As AI becomes more prevalent in creative work, this session explores how community and human connection serve as the defining element that makes creative output uniquely personal. Figma discusses building tools centered on collaboration and shared perspective."},
 "From handoffs to upstream":{u:"9d0af264-b7d0-4442-be81-26aef7ea89ca",d:"EDL がデザインスタジオの立ち位置を「下流の納品先」から「上流のパートナー」に移した話。デザインシステムを Git に直接 push し、エンジニアリングチームと対等に並走する戦略。",de:"EDL's journey of positioning their design studio upstream in engineering workflows by pushing design systems directly to Git repositories and operating as a partner to engineering teams rather than a downstream service."},
 "How structured thinking gives your AI superpowers":{u:"ca0448a6-6274-455e-b32e-7ed465ed8e7a",d:"AI を「便利なツール」止まりにしないために、構造化された思考と整理されたプロセスをかぶせる。Atlassian の AI デザイン責任者が、AI を本当の共作パートナーに変えるやり方を語る。",de:"Top designers leverage structured thinking and organized processes to transform AI from a simple creative tool into a true collaborative partner that amplifies their design work."},
 "The metacognitive design loop":{u:"6c44950a-077d-47bf-bad1-8cc71f995957",d:"Epsilon のデザインチームが品質保証を設計の最初の段階から組み込んだ「Metacognitive Design Loop」の話。Figma Code Connect と MCP を組み合わせ、設計から本番投入までを高速化した実装例。",de:"Epsilon's design team integrated quality assurance into the initial design phase using a Metacognitive Design Loop combined with Figma's Code Connect and MCP tools, enabling faster delivery from design concept to production."},
 "Human methods, new material: designing with AI for the classroom":{u:"571df27c-3044-4342-96d2-ae016ce9c3b4",d:"Goodnotes が教室向け AI 機能を、技術主導ではなく人間中心で作った経験。教師の観察と共創プロセスからプロダクト判断を引き出すアプローチを共有する。",de:"This session explores how Goodnotes built classroom AI tools by centering human needs, using teacher observations and co-creation to inform product decisions rather than letting technology drive design."},
 "The edge case is everyone":{u:"248c6563-329e-4eee-9271-de8fa416a85e",d:"T-Mobile と Kettle が、ろう者・難聴者のコミュニティと組んで音声通信技術を再設計した事例。インクルーシブな設計が結果として全員にとって良い体験を作る、という主張。",de:"T-Mobile and Kettle partnered with the Deaf and Hard of Hearing community to redesign voice communication technology, demonstrating how inclusive design principles create better experiences for everyone."},
 "Your best practices are trapped in your head—and your AI has no idea":{u:"dbf85ddc-ab1f-41cf-8b33-e488f14b55a7",d:"デザインのベストプラクティスや組織の暗黙知が AI ツールから見えないせいで、プロジェクト横断で一貫した支援を得られない問題を扱う。チームの基準と原則を AI が読める「共有知識層」を作り、仕様書・プロトタイプ・デザインシステムまで支援可能にする方法を探る。",de:"The session addresses how design best practices and organizational knowledge remain inaccessible to AI tools, preventing them from providing consistent help across projects. It explores techniques for creating a shared knowledge layer that enables AI to assist with specifications, prototypes, and design systems by understanding your team's unique standards and principles."},
 "ESPN's migration playbook: the move to Figma with One North":{u:"5ec10ea1-ecd4-4ccc-ab98-bc3ccd03137f",d:"ESPN と One North が、Photoshop から Figma へ移行することで、デザインの協業・スケーリング・放送ワークフローをどう改善したか。両社にとってのデザインシステムの効用を具体例で示す。",de:"ESPN and One North share how migrating from Photoshop to Figma improved design collaboration, scaling, and broadcast workflow efficiency, demonstrating how the design system benefited both organizations."},
 "Build like it's 2030. Listen like you mean it.":{u:"24762e47-798d-47d7-83fd-7ae7c2d0d412",d:"AI が UI 制作を自動化していく中でも、デザイナーの仕事は無くならず、リサーチ・顧客理解・デザイン判断といった戦略領域に重心が移っていく、という話。Great Question の Ned Dwyer が自チームの適応事例と、今すぐ使える 3 つの戦略を共有する。",de:"Designers will need to evolve as AI automates UI production; the role becomes more strategic, focusing on research, customer insights, and design judgment rather than disappearing. Ned Dwyer shares how his team adapted to this shift and offers actionable strategies designers can implement."},
 "Prototypes, failures, and unexpected breakthroughs":{u:"b9992211-46a6-4f20-b7b1-358a8d23e352",d:"Figma の Noah Finer が、雑で速いプロトタイピングと、細部を磨き込むマイクロインタラクション設計という対照的な 2 つのエンジニアリング思考が、Slides や FigPals などの開発でどう絡み合っているかを語る。",de:"Noah Finer explores how two contrasting engineering approaches—rapid prototyping with janky interactions and meticulous refinement of subtle microinteractions—inform his work building Figma products like Slides and interactive experiences."},
 "Reimagining NASA.gov to tell Earth's most important stories":{u:"1a2f5f6c-dc7f-431b-acc7-5fd16befe8b4",d:"NASA.gov のリデザインと、新しい Horizon Design System の話。協働での設計プロセス、ステークホルダー調整、世界中の人に科学的成果を届けるためのスケーラブルなシステム設計を扱う。",de:"NASA's redesigned website and new Horizon Design System enable the organization to communicate its missions and discoveries more effectively. The session explores the collaborative design process, stakeholder alignment, and scalable systems that bring scientific achievements to a global audience."},
 "Closing keynote":{u:"e8ea736f-5159-46d9-bed5-49855d992a91",d:"現実世界のモーションキャプチャを、デザインとコードで使える編集可能なカーブに落とし込む手法。Capture → Curve → Polish → Name という実践ワークフローで、自然な動きの UI とチームで共有できるモーション言語を作る。",de:"Learn how to convert real-world motion capture into clean, editable curves for design and code. The session covers a practical workflow—capture, curve, polish, name—to create natural-feeling interfaces and share motion language across teams."},
 "Opening keynotes":{u:"6c5a7b92-88f7-42d7-9ddc-b67cb35ec4ab",d:"数学の見せ方と発見の仕方をデザイン原則がどう形作るかを掘る Day 2 オープニング。3Blue1Brown の Grant Sanderson らが、創作の選択と視点が数学への向き合い方を変えることを示す。",de:"This keynote examines how design principles shape the presentation and discovery of mathematics, exploring the creative choices and perspectives that transform how we approach mathematical problems."},
 "Lab: upskill on skills and agentic workflows":{u:"1b7a9cce-f147-4d99-8755-717fc70b8575",d:"リサーチフレームワークやハンドオフ規約といった構造化された知識を「AI スキル」として設計・配布し、エージェントを速く正確に動かす方法を学ぶラボ。セッション中に実際にスキルを 1 つ作る。",de:"Learn how to design and deploy AI skills—structured knowledge like research frameworks and handoff standards—that enable agents to work faster and more accurately, with hands-on practice building an actual skill during the session."},
 "Designing in the age of the 10x engineer":{u:"49406317-eda9-427a-84f6-c88b24857ed8",d:"AI が制作の摩擦をなくした時代に、デザイナーの役割はどう進化すべきか。Google の Andy Zhang が、意図駆動の体験設計と、速いエンジニアリングを「余計な機能の量産」ではなく「より人間中心のプロダクト」に向かわせるためのプロセス設計を考える。",de:"Andy Zhang examines how designers adapt when AI makes creation frictionless, exploring intent-driven experiences and questioning how to evolve product processes so rapid engineering produces better human-centered products rather than unnecessary features."},
 "10 years of daily sketching":{u:"702164d5-9654-468e-9e8a-eeb3ef609fe7",d:"Zach Lieberman が 10 年間毎日スケッチを続けて見えてきた、退屈さ・反復・リサーチ・そして創作の自由を見つけることについての気づきを語る。",de:"Zach Lieberman shares insights from a decade-long daily creative practice, exploring how consistent skill-building reveals lessons about boredom, iteration, research, and discovering artistic freedom."},
 "The invisible mechanisms in your interfaces":{u:"cb25f8b3-31db-4849-a799-d02a2f052f5c",d:"Johannes Mutter が、インターフェースに埋め込まれた目に見えない設計パターンと仕組みを解き明かす。それらを分解し名前を付けることで、UI 設計を深く理解し、他人に説明できるようにする実践方法。",de:"Johannes Mutter explores hidden design patterns and mechanisms embedded in interfaces, teaching attendees how to deconstruct and name these systems to better understand and communicate interface design."},
 "The world of street art and care-filled design":{u:"d4956efb-26bd-4c93-97c6-9ef7fdd72305",d:"ストリートアーティスト兼デザイナーの Ella Rochelle-Lawton が、大手テック企業との協業から学んだ「ピクセルではなく人のために設計する」考え方を共有する。ストリートアートがコミュニティの帰属感と公共空間の意味をどう作り直すかを扱う。",de:"Street artist and designer Ella Rochelle-Lawton explores how street art builds community belonging and redefines public spaces, sharing insights from collaborations with major tech companies about designing for people rather than just pixels."},
 "Dense by design":{u:"69636242-b6b2-4b27-a831-bfd73eed654f",d:"UI の密度を原理から考える話。Google や Bloomberg Terminal のように成功した製品が、画面を詰め込むのではなく「画面内の情報価値」を最大化していることを検証し、デザイン理論と心理学に根ざしたフレームワークを提示する。",de:"This session explores UI density principles, examining why successful products like Google and Bloomberg Terminal prioritize maximizing information value within screen space rather than overcrowding interfaces. The speaker presents a framework grounded in design theory and psychology."},
 "Building real-time user insights into your design workflow":{u:"ddcc3459-4bc6-43d4-8aba-103c1870e703",d:"ユーザーからのフィードバックをリアルタイムで設計プロセスに組み込み、リリース後に問題に気づくのではなく、意思決定の瞬間にユーザーの声を反映させる方法。",de:"Learn how to integrate real-time user feedback directly into your design process so teams can make decisions based on user insights immediately, rather than discovering problems after launch."},
 "Managing multiple creative passions in a world that tells you to specialize":{u:"320859cb-ec55-495e-aeef-2cb7beea60cd",d:"「専門を 1 つに絞れ」と言ってくる世界の中で、Lauren Hom が 15 年のキャリアを通して複数の創作活動をどう同時に育ててきたかを語る。",de:"Lauren Hom shares her approach to pursuing multiple creative interests throughout her 15-year career despite societal pressure to focus on a single specialty."},
 "Usernames on Instagram: how a craft fix became an identity crisis":{u:"5d1f7e2d-c6f5-4001-b2c7-23f70a9f92d9",d:"Instagram のユーザーネーム機能が、小さな UI 改善の話のはずが、ユーザーの行動がプロダクト設計をどう変えるか、デジタル上の自己表現が現実とどうズレていくか、というオンラインアイデンティティ論にまで発展した経緯。",de:"Instagram's username feature evolved from a minor interface fix into a deeper exploration of online identity, examining how user behavior shapes product design and how digital representations diverge from reality."},
 "AI will upend your process—for the better":{u:"b751e092-79d1-4082-9c8f-aeeba6ec3b0e",d:"AI がソフトウェア開発のボトルネックをどう取り払い、価値提供を速めるかを扱う。デザインシステムへの AI 活用、ユーザーストーリー生成、デザインファイルからのコード生成などを含む。",de:"This session explores how AI streamlines software development by eliminating workflow bottlenecks and accelerating value delivery. Topics include using AI for design systems, generating user stories, and producing code from design files."},
 "The future is low-tech: lessons from the early 2000s":{u:"79c76468-0c48-41ae-8775-7a46d4409bb3",d:"2000 年代初頭のテクノロジーデザインを振り返り、ユーザーの自律性と穏やかなインタラクションを重視した「搾取しない」アプローチから現代が学べることを掘る。今のデザインを人間中心に戻す主張。",de:"This session examines design principles from the early 2000s that prioritized calm, playful technology focused on user autonomy and gentle interaction rather than extraction, arguing for more human-centered approaches to modern design."},
 "Lab: express yourself with Figma Draw":{u:"9db83287-aa02-4fb5-9a5f-b18916098e8f",d:"Figma Draw を使って参加者全員で共同アートを作る対話型ワークショップ。表現力豊かなデザイン機能を実際に試しつつ、終了後に Figma チームとカジュアルに交流できる。",de:"An interactive collaborative workshop where participants create shared artwork together using Figma Draw, demonstrating expressive design capabilities and fostering informal networking with the Figma team afterward."},
 "Figma deep dive: inside the Weave workflow":{u:"82e928ab-95f0-46a3-b6f1-157a5f6fff00",d:"Figma の Weave ワークフローの裏側にある制作プロセスを掘る回。AI を「目新しいおもちゃ」から「実用的な制作手段」に変えるための判断・反復・問題解決の積み重ねを見せる。",de:"This session explores the creative process behind Figma's Weave workflow, examining the decision-making, iterations, and problem-solving that transform AI from a novelty tool into a practical creative method."},
 "The canvas is not dead":{u:"3a3146f3-98c6-40e7-a09b-ff3c606bf5c1",d:"「キャンバスは死んでいない」。文脈の深い大規模プロダクトでは手を動かして考える価値があり、何を自分で探索し何をAIに渡すかの判断軸を示す。",de:"'The canvas isn't dead.' On deep, large-scale products there's still value in thinking with your hands — and a rubric for what to explore yourself vs. hand off to AI."},
 "Quirk up your workplace":{u:"8d8c083f-75c5-4595-ba5d-c8c2809ec350",d:"職場にユーモアと遊び心を持ち込むためのリチュアルやアクティビティの話。GitHub のリモートワークを楽しくしてきた具体的な仕掛けの例を紹介する。",de:"This session explores ways to bring humor and playfulness into the workplace through creative rituals and activities, with examples from GitHub's approach to making remote work more enjoyable."},
 "Lab: workflow tips—from slow to flow":{u:"cdacc08f-a60e-4ece-bb3b-6b186a3a9dfc",d:"Figma 上で効率よく作業するための実用的な小ネタとワークフロー術を集めたラボ。キャンバスの生産性まわりと関連ツールを扱う。",de:"This session shares practical tips and workflow techniques to help designers work more efficiently in Figma, covering canvas productivity and related tools."},
 "Everyone's still eating: building Notion's design system":{u:"9bbf68e9-0644-48df-9b6c-f4ad1827a146",d:"Notion で新しく結成されたデザインシステムチームの話。デザイン主導の会社で、ビジュアル基盤の刷新と内部の一貫性向上を進めつつ、Notion らしい「丁寧で手作りの美学」を保ち、進行中の業務を止めないという難しいバランスをどう取るか。",de:"Notion's newly formed design system team shares their approach to implementing a design system at a design-led company, balancing the need to refactor visual foundations and improve internal consistency while maintaining the thoughtful, handcrafted aesthetic that defines Notion's brand without disrupting ongoing work."},
 "In praise of dark mode":{u:"404d5692-4463-4304-b74c-723a71e491a1",d:"ダークモードは「オプションのトグル」ではなく、すべての UI の根本的な設計原則であるべきだ、という挑発的な主張。長年のデザインとエンジニアリング経験を背景に、画面から出る光を最小限にすることが優れた設計慣行である理由を説く。",de:"This talk argues that dark mode should be the fundamental design principle for all user interfaces, not merely an optional toggle. The speaker draws on extensive design and engineering experience to explain why interfaces that emit minimal light represent superior design practice."},
 "Preparing Rocket for the AI era":{u:"cc9f82eb-31cd-4bd3-93db-bb060c95a6ac",d:"Rocket が、Figma のデザインシステム・Code Connect・Figma Make・Figma MCP を組み合わせて AI ネイティブなプロセスを組み、数千人規模のチームが日常的に AI を使える状態に持っていった事例。",de:"Rocket shares how they're integrating AI into daily workflows across their organization by leveraging Figma's design systems, Code Connect, Figma Make, and the Figma MCP to enable AI-native processes and help teams achieve homeownership goals at scale."},
 "Designing with confidence in an AI-powered world":{u:"f9a5d27e-b1c3-4674-92ee-0545d7822fc0",d:"AI のおかげで設計は速くなったが、その分「なぜこのデザインなのか」を説明しづらくなった。実際のユーザーインサイトを設計プロセスに組み込むことで、速さと確信を両立させる方法をリサーチデータから示す。",de:"AI has accelerated design workflows, but speed creates challenges in defending design decisions. This session explores research on how teams can integrate real human insights into their design process to build confidence and conviction while moving quickly."},
 "Designed to be read: making a system AI can actually use":{u:"c856c21b-317e-482c-8a3f-f01280aeed56",d:"Meta と Figma が AI 生成物の品質課題に応えるためデザインシステムを作り直した経験。システム全体を壊さずに、AI が読める／使えるシステムにするための 3 ステップの再利用可能な手順を共有する。",de:"Meta and Figma partnered to rebuild a design system for AI-generated outputs, addressing quality challenges. The session shares a three-step playbook for delivering high-quality AI designs without completely reconstructing your system."},
 "Designing brand intelligence: from rules to expression":{u:"b14b91d9-50d9-4081-a943-51f331a2b4b4",d:"AI がデザイナーの役割をどう変えるかを扱う回。ブランドガイドを「厳格なルール集」ではなく「認知のフレームワーク」と捉え直し、Figma の対話的ツールでデザイナーが戦略的ディレクターへ進化するための考え方。",de:"Explores how AI is transforming design roles, positioning brand guides as cognitive frameworks rather than rigid rules, and teaching designers to evolve into strategic directors using interactive Figma tools."},
 "Lab: build your first Weave workflow":{u:"f94f6215-0d25-4b2e-8b14-7e00a74588e6",d:"Figma Weave のワークフローをゼロから 1 本作るハンズオン。ノードベースのツールで AI モデルを繋ぎ、出力をコントロールする感覚を掴む。",de:"A hands-on learning session where participants build their first Figma Weave workflow from scratch, connecting AI models and controlling outputs through node-based tools."},
 "Own the loop: how designers and researchers win with AI evals":{u:"2bb4e5de-dbaf-47c5-8c12-b58e5728ab62",d:"AI の評価ループをデザイナーとリサーチャーが主導し、「何が良いか」を人間中心に定義しに行くべき、という話。AI 能力がコモディティ化するほど、設計の力こそが競争優位になる、という主張。",de:"This session explores how design and research teams can lead AI evaluation efforts by establishing human-centered definitions of quality, arguing that as AI capabilities become commoditized, strong design practices become the competitive advantage."},
 "Gnarly by design: building systems with grit":{u:"c6c9fdb6-0e45-4b0e-b966-76675517b045",d:"テクスチャと個性のあるデザインシステムをスケーラビリティと両立させて作る方法。ビデオゲームのデザインシステムを題材に、美的魅力とクリーンな設計原則のバランスを学ぶ。",de:"Learn how to create texture-rich design systems with character while maintaining scalability, using a video game design system as a case study to balance aesthetic appeal with clean design principles."},
 "300GB story: how to inspire action when data isn't enough":{u:"e2b0051f-0b4a-4860-bca5-71e668b04bd9",d:"ハーバード大の 2 人のデザイナーが、300GB の気候データを「Habitat2100」というインタラクティブな Figma 体験に落とし込んだ事例。複雑なデータを感情に届く物語に変え、地球の持続可能性に向けた行動を促す手法。",de:"Two Harvard designers demonstrate how they transformed 300GB of climate data into Habitat2100, an interactive Figma experience that converts complex datasets into emotional narratives that inspire people to take action for planetary sustainability."},
 "Design for the future of apps":{u:"d942bacb-600a-437f-817a-6d61794a930d",d:"生成 UI（AI による動的な UI）がユーザー体験をパーソナライズする一方で、一貫性や情報階層の明確さに新しい課題を持ち込むことを扱う。この新しいパターンに合わせてデザインシステムを進化させる方法。",de:"This session explores how generative UI—AI-powered dynamic user interfaces—can personalize user experiences while presenting design challenges around consistency and information clarity, teaching designers how to evolve design systems for this emerging pattern."},
 "The marathon designer: creative endurance beyond prompts and pixels":{u:"7856aab8-4ce1-430a-8066-efae860ffa60",d:"デザイナーのバーンアウトに対抗するための、ペース配分・協働文化・柔軟な採用といったフレームワークを、ブートストラップなデザインスタジオを運営してきた経験から語る。",de:"A framework for sustainable creative practice that addresses designer burnout through pacing, collaborative culture, and flexible hiring, illustrated through experiences running a bootstrapped design studio."},
 "Don't forget the feeling: a critique of software in 2026":{u:"4b523a98-9e0e-4b9e-8783-c405ab892602",d:"AI ツールを取り込んで創作を加速させつつも、エモーショナルなデザインとブランドアイデンティティの大事さを忘れないように、という話。2026 年のソフトウェアへの批評。",de:"Luis explores how to embrace AI tools to enhance creative work while maintaining the importance of emotional design and brand identity in software development."},
 "Designing money: how to build a trustworthy brand in the age of AI":{u:"a2fa6160-4f88-4215-a6e9-f91c78ee3d51",d:"機械学習とクリエイティブなデザインをどう組み合わせて、信頼される金融ブランドを作るか。グラフィックデザインを通じて金融の「信頼」がどう作られてきた歴史を辿りつつ、AI 時代のブランドアイデンティティの行方を考える。",de:"The session explores how to combine machine learning with creative design to build authentic financial brands, examining the history of trust in finance through graphic design and considering what AI means for the future of brand identity."},
 "Design systems anarchy":{u:"ace52d61-6725-4338-80c9-cd8b0e8757e4",d:"デザインシステムは往々にして窮屈なゲートキーパーになりがちだが、パンクの哲学（規則遵守より共有された文化）を当てて、生きたシステムにしようという提案。AI でツールが民主化される中、トップダウンのルール強制ではなく協働的なサブカルチャーを育てるべきだという話。",de:"Design systems often become restrictive gatekeeping mechanisms, but this talk proposes applying punk philosophy—emphasizing shared culture over compliance—to create thriving design systems. With AI democratizing design tools, the speaker argues teams should nurture collaborative subcultures rather than enforce top-down rules."},
 "Legibility by design":{u:"b2201a51-7000-4303-a371-ce00f5d9e2ed",d:"AI への信頼は単なる透明性ではなく、丁寧なコミュニケーション設計から生まれる、という話。ユーザーが意図を理解でき、アラート疲れを起こさず、予測可能で頼れる AI を作るためのフレームワーク。",de:"Building AI trust requires thoughtful communication design rather than mere transparency. The session presents a framework for creating legible AI systems that help users understand intent, manage feedback effectively to prevent alert fatigue, and ultimately feel predictable and dependable."},
 "Closing keynote — Death of the finished state":{u:"2327c9de-d189-4b98-b49c-79bffa38b723",d:"Brent David Freaney が、音楽アルバム・雑誌・デジタルメディアにまたがるデザイン哲学を共有する Day 2 クロージング。緑の色味 1 つを選び抜くような細部へのこだわりとシステム思考が、文化に効くクリエイティブを生むことを示す。",de:"Brent David Freaney shares his design philosophy spanning music albums, magazines, and digital media, demonstrating how thoughtful systems thinking and meticulous attention to detail—like selecting a single shade of green—create culturally impactful creative work."},
};
const sessionUrl=x=>{const m=EXTRA[x.title];return m?`https://config.figma.com/san-francisco/${m.ev?"event":"session"}/${m.u}/`:null;};

const hidden=new Set();

let mineOnly=false;
let going=new Set();
try{const raw=localStorage.getItem("going");if(raw)going=new Set(JSON.parse(raw));}catch(e){}
const saveGoing=()=>{try{localStorage.setItem("going",JSON.stringify([...going]));}catch(e){}};
const getKey=x=>`${x.title}@${x.s??x.t??""}@${x.stage||""}`;

function buildLegend(){
  const nav=document.getElementById("legend");
  ORDER.forEach(key=>{
    const b=document.createElement("button");
    b.className="chip";b.setAttribute("aria-pressed","true");
    b.style.setProperty("--c",cv(key));
    b.innerHTML=`<span class="dot"></span>${STAGES[key].label}`;
    b.onclick=()=>{hidden.has(key)?hidden.delete(key):hidden.add(key);
      b.setAttribute("aria-pressed",hidden.has(key)?"false":"true");render();};
    nav.appendChild(b);
  });
  const m=document.createElement("button");
  m.className="chip mine";m.id="mineChip";
  m.setAttribute("aria-pressed",mineOnly?"true":"false");
  m.style.setProperty("--c","#f59e0b");
  m.innerHTML=`<span class="dot"></span><span class="lbl">${t("mineLabel")}</span> <span class="count">(${going.size})</span>`;
  m.onclick=()=>{mineOnly=!mineOnly;m.setAttribute("aria-pressed",mineOnly?"true":"false");render();};
  nav.appendChild(m);
}
function updateMineChip(){
  const m=document.getElementById("mineChip");if(!m)return;
  m.setAttribute("aria-pressed",mineOnly?"true":"false");
  m.querySelector(".lbl").textContent=t("mineLabel");
  m.querySelector(".count").textContent=`(${going.size})`;
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";

  const preList = mineOnly ? PRESHOW.filter(p=>going.has(getKey(p))) : PRESHOW;
  if (preList.length){
    const pre=document.createElement("section");pre.className="day";
    pre.innerHTML=`<div class="day-head"><span class="day-date">June 23</span>
      <span class="day-dow">${t("preDow")}</span><span class="day-meta">${t("eventsCount",preList.length)}</span></div>
      <div class="preshow">${preList.map(p=>`<div class="pre-card" data-id="${p._id}">
        <div class="pt">${p.t}</div><h3>${p.title}${going.has(getKey(p))?' <span class="going-mark">★</span>':''}</h3><p>${p.org}</p></div>`).join("")}</div>`;
    app.appendChild(pre);
  }

  DAYS.forEach(day=>{
    const cols=ORDER.filter(s=>!hidden.has(s));
    const colIndex={};cols.forEach((s,i)=>colIndex[s]=i+2);
    const rows=(day.end-day.start)/5;
    const line=m=>2+(m-day.start)/5;
    const visible=ev=>(!mineOnly||going.has(getKey(ev)))&&(!hidden.has(ev.stage)||ev.key);
    const count=day.sessions.filter(visible).length;
    if(mineOnly&&count===0)return;

    const sec=document.createElement("section");sec.className="day";
    sec.innerHTML=`<div class="day-head"><span class="day-date">${day.date}</span>
      <span class="day-dow">${day.dow}</span><span class="day-meta">${t("sessionsCount",count)}</span></div>`;

    const wrap=document.createElement("div");wrap.className="tt-wrap";
    const tt=document.createElement("div");tt.className="tt";
    tt.style.gridTemplateColumns=`var(--timew) repeat(${cols.length}, minmax(0,1fr))`;
    tt.style.gridTemplateRows=`auto repeat(${rows}, var(--u))`;

    let html=`<div class="tt-h time-h">PDT</div>`;
    cols.forEach(s=>{html+=`<div class="tt-h" style="--c:${cv(s)}"><span class="bar"></span>${STAGES[s].label}</div>`;});
    for(let m=day.start;m<=day.end;m+=60){
      html+=`<div class="hourline" style="grid-row:${line(m)}"></div>`;
      html+=`<div class="hourlabel" style="grid-row:${line(m)} / span 12">${fmt(m).replace(":00","")}</div>`;
    }
    html+=`<div class="timefill" style="grid-row:2 / ${rows+2}"></div>`;

    day.sessions.forEach(ev=>{
      if(!visible(ev))return;
      const col=ev.key?`2 / -1`:`${colIndex[ev.stage]}`;
      if(!ev.key&&col==="undefined")return;
      const isGoing=going.has(getKey(ev));
      html+=`<div class="ev ${ev.key?'key':''} ${ev.venue?'venue':''} ${isGoing?'going':''}" data-id="${ev._id}"
        style="grid-column:${col};grid-row:${line(ev.s)} / ${line(ev.e)};--c:${cv(ev.stage)}">
        <span class="etime">${fmtRange(ev.s,ev.e)}</span>
        <span class="eorg">${ev.org}</span><h3>${ev.title}</h3>
        ${isGoing?'<span class="going-mark">★</span>':''}</div>`;
    });

    tt.innerHTML=html;wrap.appendChild(tt);sec.appendChild(wrap);app.appendChild(sec);
  });

  document.querySelectorAll("[data-id]").forEach(el=>{
    el.addEventListener("click",()=>openSheet(+el.getAttribute("data-id")));
  });
}

/* ---------- Bottom sheet ---------- */
const scrim=document.getElementById("scrim"),sheet=document.getElementById("sheet"),
      body=document.getElementById("sheetBody");
function openSheet(id){
  const x=ALL[id];if(!x)return;
  const stage=x.stage||"venue";const color=cv(stage);
  const time = x.t ? x.t : `${fmt(x.s)} – ${fmt(x.e)}`;
  const stageLabel = (STAGES[stage]||STAGES.venue).label + (x._pre?"":t("stageSuffix"));
  const tags=[];
  if(x.theme)tags.push(`<span class="theme">${x.theme}</span>`);
  (x.topics||[]).forEach(tp=>tags.push(`<span>${tp}</span>`));
  const spk=(x.spk||[]).map(p=>`<div class="spk">
      <div class="av" style="background:${color}">${initials(p.n)}</div>
      <div><div class="nm">${p.n}</div><div class="rl">${p.r}</div></div></div>`).join("");
  const meta=EXTRA[x.title];
  const url=sessionUrl(x);
  const descEn = x.descEn || (meta&&meta.de) || "";
  const descJa = x.desc   || (meta&&meta.d)  || "";
  const desc = lang==="en" ? (descEn || descJa) : (descJa || descEn);
  const key=getKey(x);
  const on=going.has(key);
  body.innerHTML=`
    <div class="s-stage" style="--c:${color}"><span class="dot"></span>${stageLabel}</div>
    <p class="s-time">${time}</p>
    <h2 id="sheetTitle">${x.title}</h2>
    ${tags.length?`<div class="s-tags">${tags.join("")}</div>`:""}
    <button class="s-going${on?' on':''}" id="goingBtn" data-key="${key}">
      <span class="star">${on?'★':'☆'}</span><span class="lbl">${on?t("inMine"):t("addToMine")}</span>
    </button>
    ${desc?`<p class="s-summary-label">${t("summaryLabel")}</p><p class="s-desc">${desc}</p>`
          :(url?`<p class="s-note">${t("noSummary")}</p>`:"")}
    ${spk?`<p class="s-sec">${t("speakersLabel")}</p>${spk}`:""}
    ${url?`<a class="s-link" href="${url}" target="_blank" rel="noopener">${t("officialLink")}</a>`:""}
  `;
  document.getElementById("goingBtn").addEventListener("click",e=>toggleGoing(key,e.currentTarget));
  sheet.style.setProperty("--c",color);
  scrim.classList.add("open");sheet.classList.add("open");
  document.body.style.overflow="hidden";
}
function toggleGoing(key,btn){
  if(going.has(key))going.delete(key);else going.add(key);
  saveGoing();
  const on=going.has(key);
  btn.classList.toggle("on",on);
  btn.querySelector(".star").textContent=on?"★":"☆";
  btn.querySelector(".lbl").textContent=on?t("inMine"):t("addToMine");
  updateMineChip();
  render();
}
function closeSheet(){scrim.classList.remove("open");sheet.classList.remove("open");
  document.body.style.overflow="";}
scrim.addEventListener("click",closeSheet);
document.getElementById("sheetClose").addEventListener("click",closeSheet);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeSheet();});

function applyLang(){
  document.documentElement.lang = lang;
  document.title = t("docTitle");
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  document.querySelectorAll("[data-i18n-aria]").forEach(el=>{
    el.setAttribute("aria-label", t(el.dataset.i18nAria));
  });
  document.querySelectorAll("#langToggle .opt").forEach(el=>{
    el.classList.toggle("on", el.dataset.opt === lang);
  });
  updateMineChip();
  render();
}

document.getElementById("langToggle").addEventListener("click",()=>{
  lang = (lang === "en") ? "ja" : "en";
  try { localStorage.setItem("lang", lang); } catch(e){}
  applyLang();
});

buildLegend();
applyLang();
</script>
</body>
</html>
