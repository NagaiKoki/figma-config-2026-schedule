<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Config 2026 — Agenda Timetable</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#15171c; --ink-soft:#5a5f6b; --paper:#f4f5f7;
    --card:#ffffff; --line:#dfe2e8; --grid:#e9ebef;
    --main:#6d28d9; --mezzanine:#d63b46; --level2:#0f8a6b;
    --maker:#d9730d; --community:#c026a6; --labs:#2563eb; --venue:#6b7280;
    --u:16px; --timew:54px; --maxw:1320px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;line-height:1.45;padding-bottom:40px}

  .masthead{max-width:var(--maxw);margin:0 auto;padding:48px 20px 18px}
  .masthead-top{display:flex;justify-content:space-between;align-items:center;gap:14px;margin:0 0 12px}
  .lang-toggle{font-family:"Space Mono",monospace;font-size:11.5px;font-weight:700;
    letter-spacing:.12em;text-transform:uppercase;background:var(--card);
    border:1px solid var(--line);border-radius:999px;padding:6px 13px;cursor:pointer;
    color:var(--ink);display:inline-flex;align-items:center;gap:8px;flex:none}
  .lang-toggle:hover{border-color:var(--ink)}
  .lang-toggle .opt{opacity:.38}
  .lang-toggle .opt.on{opacity:1;color:var(--main)}
  .lang-toggle .sep{opacity:.4}
  .eyebrow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--main);margin:0}
  .masthead h1{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;
    font-size:clamp(34px,7vw,72px);line-height:.96;letter-spacing:-.02em;margin:0 0 14px}
  .masthead h1 em{font-style:normal;color:var(--main)}
  .sub{font-size:15px;color:var(--ink-soft);max-width:62ch;margin:0}
  .sub b{color:var(--ink);font-weight:600}

  .legend{max-width:var(--maxw);margin:18px auto 0;padding:0 20px;
    display:flex;flex-wrap:wrap;gap:7px;align-items:center}
  .legend .hint{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-soft);margin-right:2px}
  .chip{appearance:none;border:1px solid var(--line);background:var(--card);color:var(--ink);
    font-family:"Inter",sans-serif;font-size:12.5px;font-weight:600;padding:5px 11px 5px 9px;
    border-radius:999px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
  .chip .dot{width:9px;height:9px;border-radius:50%;background:var(--c);flex:none}
  .chip[aria-pressed="false"]{opacity:.32;text-decoration:line-through}
  .chip:hover{border-color:var(--ink)}

  .day{max-width:var(--maxw);margin:0 auto;padding:0 20px}
  .day-head{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;
    margin:42px 0 12px;padding-bottom:11px;border-bottom:2px solid var(--ink)}
  .day-date{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:30px;letter-spacing:-.015em}
  .day-dow{font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.14em;
    text-transform:uppercase;color:var(--main);align-self:center}
  .day-meta{margin-left:auto;font-size:12px;color:var(--ink-soft);
    font-family:"Space Mono",monospace}

  .preshow{display:flex;flex-wrap:wrap;gap:10px}
  .pre-card{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--venue);
    border-radius:12px;padding:13px 15px;flex:1 1 230px;min-width:200px;cursor:pointer}
  .pre-card .pt{font-family:"Space Mono",monospace;font-size:11px;color:var(--ink-soft)}
  .pre-card h3{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;font-size:16px;margin:4px 0 2px}
  .pre-card p{margin:0;font-size:12.5px;color:var(--ink-soft)}

  .tt-wrap{border:1px solid var(--line);border-radius:14px;background:var(--card);overflow:hidden}
  .tt{display:grid;position:relative}
  .tt-h{position:sticky;top:0;z-index:6;background:var(--card);
    font-family:"Space Mono",monospace;font-size:10px;font-weight:700;letter-spacing:.04em;
    text-transform:uppercase;text-align:center;padding:9px 3px;border-bottom:1px solid var(--line)}
  .tt-h .bar{display:block;height:3px;border-radius:2px;background:var(--c);margin:0 auto 5px;width:24px}
  .tt-h.time-h{z-index:7;color:var(--ink-soft);text-align:left;padding-left:8px}

  .hourline{grid-column:1 / -1;border-top:1px solid var(--grid);z-index:0;pointer-events:none}
  .hourlabel{grid-column:1;z-index:3;background:var(--card);
    font-family:"Space Mono",monospace;font-size:11px;font-weight:700;color:var(--ink-soft);
    padding:2px 6px 0 8px;border-right:1px solid var(--line)}
  .timefill{grid-column:1;z-index:2;background:var(--card);border-right:1px solid var(--line)}

  .ev{z-index:1;margin:2px;border-radius:8px;background:var(--card);
    border:1px solid var(--line);border-left:3px solid var(--c);
    padding:5px 7px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;gap:1px;
    transition:transform .08s,box-shadow .12s}
  .ev:hover{box-shadow:0 3px 12px rgba(0,0,0,.13);transform:translateY(-1px);z-index:4}
  .ev .etime{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;
    letter-spacing:.02em;color:var(--ink);line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev .eorg{font-family:"Space Mono",monospace;font-size:9.5px;font-weight:700;
    letter-spacing:.02em;color:var(--c);text-transform:uppercase;line-height:1.15;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ev h3{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;
    font-size:12px;line-height:1.13;letter-spacing:-.005em;margin:0;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  .ev.key{background:var(--main);border:none;color:#fff;padding:9px 13px;justify-content:center}
  .ev.key .etime{color:rgba(255,255,255,.9);font-size:11px}
  .ev.key .eorg{color:rgba(255,255,255,.82)}
  .ev.key h3{font-size:17px;-webkit-line-clamp:2}
  .ev.venue{background:#eef0f2;border-left-color:var(--venue)}
  .ev.venue.key{background:#5b6470}

  /* ---------- Bottom sheet ---------- */
  .scrim{position:fixed;inset:0;background:rgba(15,17,23,.46);opacity:0;visibility:hidden;
    transition:opacity .2s,visibility .2s;z-index:90}
  .scrim.open{opacity:1;visibility:visible}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:100;background:var(--card);
    border-radius:22px 22px 0 0;box-shadow:0 -10px 40px rgba(0,0,0,.25);
    max-height:80vh;overflow-y:auto;transform:translateY(101%);
    transition:transform .26s cubic-bezier(.32,.72,0,1);padding:0 22px 30px}
  .sheet.open{transform:translateY(0)}
  .sheet-grip{position:sticky;top:0;background:var(--card);padding:11px 0 4px;display:flex;justify-content:center}
  .sheet-grip::before{content:"";width:38px;height:4px;border-radius:3px;background:var(--line)}
  .sheet-close{position:absolute;top:12px;right:16px;border:none;background:#eef0f2;color:var(--ink);
    width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;line-height:1}
  .sheet .s-stage{display:inline-flex;align-items:center;gap:7px;font-family:"Space Mono",monospace;
    font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c);margin:4px 0 2px}
  .sheet .s-stage .dot{width:9px;height:9px;border-radius:50%;background:var(--c)}
  .sheet .s-time{font-family:"Space Mono",monospace;font-size:13px;color:var(--ink-soft);margin:0 0 10px}
  .sheet h2{font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:25px;
    line-height:1.1;letter-spacing:-.015em;margin:0 0 14px}
  .s-tags{display:flex;flex-wrap:wrap;gap:6px;margin:0 0 18px}
  .s-tags span{font-size:11.5px;color:var(--ink-soft);border:1px solid var(--line);
    border-radius:6px;padding:2px 8px}
  .s-tags .theme{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:600}
  .s-sec{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-soft);margin:0 0 8px;padding-top:6px;border-top:1px solid var(--line)}
  .spk{display:flex;gap:11px;align-items:flex-start;margin-bottom:11px}
  .spk .av{width:34px;height:34px;border-radius:50%;flex:none;background:var(--c);color:#fff;
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;
    font-family:"Bricolage Grotesque",sans-serif}
  .spk .nm{font-weight:600;font-size:14.5px;line-height:1.2}
  .spk .rl{font-size:12.5px;color:var(--ink-soft);line-height:1.25}
  .spk .rl b{color:var(--ink);font-weight:600}
  .s-summary-label{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--ink-soft);margin:2px 0 7px;padding-top:8px;border-top:1px solid var(--line)}
  .s-desc{font-size:14.5px;line-height:1.62;color:var(--ink);margin:0 0 18px}
  .s-note{font-size:12.5px;color:var(--ink-soft);margin:8px 0 16px;line-height:1.5}
  .s-link{display:inline-flex;align-items:center;gap:6px;margin-top:10px;
    font-family:"Inter",sans-serif;font-weight:600;font-size:14px;color:#fff;
    background:var(--c);border-radius:999px;padding:11px 19px;text-decoration:none}
  .s-link:hover{filter:brightness(.93)}

  .footnote{max-width:var(--maxw);margin:30px auto 0;padding:0 20px;font-size:11.5px;
    color:var(--ink-soft);font-family:"Space Mono",monospace}
  .footnote + .footnote{margin-top:4px}
  .footnote a{color:inherit;text-decoration:underline;text-decoration-thickness:1px;
    text-underline-offset:2px}
  .footnote a:hover{color:var(--ink)}
  .toolbar{position:fixed;right:18px;bottom:18px;z-index:50}
  .btn{font-family:"Inter",sans-serif;font-weight:600;font-size:14px;background:var(--ink);
    color:#fff;border:none;border-radius:999px;padding:11px 19px;cursor:pointer;
    box-shadow:0 6px 22px rgba(0,0,0,.22)}
  .btn:hover{background:var(--main)}

  @media (max-width:600px){
    :root{--timew:40px;--u:17px}
    .ev{padding:4px 5px;border-left-width:3px}
    .ev h3{font-size:10.5px;-webkit-line-clamp:2}
    .ev .etime,.ev .eorg{font-size:8.5px}
    .ev.key h3{font-size:14px}
    .tt-h{font-size:8.5px;padding:7px 1px}
    .tt-h .bar{width:16px}
    .sheet h2{font-size:21px}
  }
  @media (prefers-reduced-motion:reduce){
    .sheet{transition:none}.scrim{transition:none}.ev{transition:none}
  }
  @media print{
    :root{--paper:#fff;--u:13px}
    body{padding:0;background:#fff}
    .toolbar,.legend,.btn,.scrim,.sheet{display:none!important}
    .masthead{padding:18px 12px 4px}
    .day{padding:0 10px;page-break-before:always}
    .day:first-of-type{page-break-before:avoid}
    .tt-h{position:static}.ev,.tt{break-inside:avoid}.ev{cursor:default}
  }
</style>
</head>
<body>
  <header class="masthead">
    <div class="masthead-top">
      <p class="eyebrow" data-i18n="eyebrow">Figma · San Francisco · Moscone</p>

        <span class="opt" data-opt="en">EN</span>

  <p class="footnote" data-i18n="footnote">Source: config.figma.com/san-francisco/agenda · Times in PDT</p>
  <p class="footnote">Hosted by <a href="https://github.com/NagaiKoki/figma-config-2026-schedule" target="_blank" rel="noopener">github.com/NagaiKoki/figma-config-2026-schedule</a></p>

let lang = (localStorage.getItem("lang") === "ja") ? "ja" : "en";

const t = (k, ...args) => {
  const v = I18N[lang][k];
  return typeof v === "function" ? v(...args) : v;
};

const cv=k=>`var(${(STAGES[k]||STAGES.venue).v})`;
function fmt(min){let h=Math.floor(min/60),m=min%60;const ap=h>=12?"PM":"AM";
  let hh=h%12;if(hh===0)hh=12;return `${hh}:${String(m).padStart(2,"0")} ${ap}`;}
function fmtRange(s,e){
  const fa=fmt(s),fb=fmt(e);
  const pa=fa.slice(-2),pb=fb.slice(-2);
  return pa===pb ? `${fa.slice(0,-3)}–${fb.slice(0,-3)} ${pb}` : `${fa}–${fb}`;
}
const initials=n=>n.replace(/[^A-Za-z ]/g,"").trim().split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase();

const PRESHOW=[

 "The rules are the art: creating with AI":{u:"94c665ce-4b37-4127-b49a-425ac25319a2",d:"AIでの創作を「Protocol Art」＝作品が生まれる条件（ルールセット）を設計する営みとして捉える。モデルづくり自体が著作になる、という視点を Holly+ などの実践から語る。",de:"Reframes AI-making as 'Protocol Art' — designing the conditions (the rule set) under which work emerges. Argues that building the model itself is the artwork, drawing on Holly+ and related projects."},
 "Lab: design to development workflows":{u:"caaf2c7f-ce7c-42f5-963f-93e20bcccbf4"},
 "Scooter, screen and duct-tape: from hack to habit":{u:"923b7644-6bbb-4260-97a1-446cb2f05daf",d:"ありもの（Arduino・iPad・Figma）で自作した道具を使う「ダクトテープ式プロトタイピング」。雑でも速い実験でアイデアを検証し、関係者を動かす考え方。",de:"'Duct-tape prototyping' with off-the-shelf gear (Arduino, iPad, Figma). Quick-and-dirty experiments to validate ideas and get stakeholders moving."},
 "Ready for the world":{u:"e220cef8-e2a0-4384-b9a7-bf6a0b23274a",d:"プロダクトデザイナーが、意思決定をテーマにした絵本を出版するまでの試行錯誤。ツールと自分を信じれば形にできる、という話。",de:"A product designer's journey to publishing a children's book on decision-making. The takeaway: trust your tools and yourself, and you can ship it."},
 "From kickoff to canvas: connecting Google Workspace and Figma":{u:"ee548465-66ff-48ed-a86b-ee55e0be22f2",d:"（公式で詳細は後日公開）Google Workspace と Figma をつなぐワークフローのセッション。",de:"(Official details forthcoming.) A session on workflows that connect Google Workspace and Figma."},
 "Dimensional shift: sculpting in Figma Draw":{u:"274b9aeb-8c3a-49b2-b241-325ec5b50487",d:"スランプを新しい道具（Figma Draw）で乗り越えた話。2Dベクターで3Dの奥行きを出す手法と、初心者に戻ることの効用。",de:"Climbing out of a creative slump with a new tool (Figma Draw). Techniques for giving 2D vectors a 3D feel — and the value of being a beginner again."},
 "Beyond design systems: designing for robots and seniors":{u:"979a7614-45e1-43a4-82d6-a0e2ef8cbed8",d:"高齢者ケア用のロボットを設計。患者や看護師と Figma の試作で検証し、あえてクマの顔に。デザインは部品ではなく「つながり」だという主張。",de:"Designing a senior-care robot. Tested with patients and nurses through Figma prototypes — and intentionally ended up with a bear's face. Argues design is connection, not parts."},
 "How to build content systems for AI product workflows":{u:"520fcaa6-76e0-4703-89b0-9f4dfb9a91de",d:"誰もがコピーを量産する時代に、ガイドラインから一貫した文言を生成し逸脱を検知する「コピーの真実源」を Figma Make と Ditto で組むワークショップ。",de:"In an era where everyone churns out copy, build a 'source of truth' that generates consistent strings from your guidelines and flags drift. Workshop with Figma Make + Ditto."},
 "Figma meets hardware: prototyping for the physical world":{u:"93485c8d-f1b1-45b3-bdca-a24e0c0bd94c",d:"Figma で家電を設計。市販の電子部品で「Figma Displays」を作り、試作を実機画面に投影。フィードバックを6か月から2分に短縮した手法。",de:"Designing home appliances in Figma. Built 'Figma Displays' from off-the-shelf electronics so prototypes show up on real device screens — collapsing feedback loops from six months to two minutes."},
 "Out of sync, on purpose: desktop design after mobile won":{u:"eb8fbae1-7cdf-420c-bfbe-cd676fccd1d0",d:"Spotify デスクトップ版の設計。モバイルを1:1で写さず、集中・没入というデスクトップの強みに合わせて作り込む小さなチームの工夫。",de:"Designing Spotify for desktop. Instead of mirroring mobile 1:1, a small team leans into desktop's strengths — focus and immersion — and tailors the experience accordingly."},
 "Lab: the many ways to make with Figma Make":{u:"ec2fc49f-9d34-46c8-9086-8887cab3bef2"},
 "Writing for humans in an AI world":{u:"47d280de-e85a-4e10-b6e6-b97734490e9f",d:"Anthropic のコンテンツデザインは、Claude の返答ではなくその周辺（プロンプト例・UI文言・名称・ボイス）を設計する。自然言語UIで変わる文章設計の話。",de:"At Anthropic, content design isn't about Claude's replies — it's about everything around them: prompt examples, UI copy, naming, and voice. How writing changes when the interface itself is natural language."},
 "Be the director: how stage craft informs product craft":{u:"8f2835f5-9701-4834-9237-0621882953fa",d:"舞台の演出家のように考える。意図的な選択をし、脚本の譲れない点を定め、プロダクトの背骨を見つける。",de:"Think like a stage director. Make intentional choices, define the script's non-negotiables, and find your product's spine."},

const sessionUrl=x=>{const m=EXTRA[x.title];return m?`https://config.figma.com/san-francisco/${m.ev?"event":"session"}/${m.u}/`:null;};

const hidden=new Set();

function buildLegend(){
  const nav=document.getElementById("legend");
  ORDER.forEach(key=>{
    const b=document.createElement("button");
    b.className="chip";b.setAttribute("aria-pressed","true");
    b.style.setProperty("--c",cv(key));
    b.innerHTML=`<span class="dot"></span>${STAGES[key].label}`;
    b.onclick=()=>{hidden.has(key)?hidden.delete(key):hidden.add(key);
      b.setAttribute("aria-pressed",hidden.has(key)?"false":"true");render();};
    nav.appendChild(b);
  });
}

function render(){
  const app=document.getElementById("app");app.innerHTML="";

  const pre=document.createElement("section");pre.className="day";
  pre.innerHTML=`<div class="day-head"><span class="day-date">June 23</span>
    <span class="day-dow">${t("preDow")}</span><span class="day-meta">${t("eventsCount",PRESHOW.length)}</span></div>
    <div class="preshow">${PRESHOW.map(p=>`<div class="pre-card" data-id="${p._id}">
      <div class="pt">${p.t}</div><h3>${p.title}</h3><p>${p.org}</p></div>`).join("")}</div>`;
  app.appendChild(pre);

  DAYS.forEach(day=>{
    const cols=ORDER.filter(s=>!hidden.has(s));
    const colIndex={};cols.forEach((s,i)=>colIndex[s]=i+2);
    const rows=(day.end-day.start)/5;
    const line=m=>2+(m-day.start)/5;
    const count=day.sessions.filter(x=>!hidden.has(x.stage)||x.key).length;

    const sec=document.createElement("section");sec.className="day";
    sec.innerHTML=`<div class="day-head"><span class="day-date">${day.date}</span>
      <span class="day-dow">${day.dow}</span><span class="day-meta">${t("sessionsCount",count)}</span></div>`;

    const wrap=document.createElement("div");wrap.className="tt-wrap";
    const tt=document.createElement("div");tt.className="tt";
    tt.style.gridTemplateColumns=`var(--timew) repeat(${cols.length}, minmax(0,1fr))`;
    tt.style.gridTemplateRows=`auto repeat(${rows}, var(--u))`;

    let html=`<div class="tt-h time-h">PDT</div>`;
    cols.forEach(s=>{html+=`<div class="tt-h" style="--c:${cv(s)}"><span class="bar"></span>${STAGES[s].label}</div>`;});
    for(let m=day.start;m<=day.end;m+=60){
      html+=`<div class="hourline" style="grid-row:${line(m)}"></div>`;
      html+=`<div class="hourlabel" style="grid-row:${line(m)} / span 12">${fmt(m).replace(":00","")}</div>`;
    }
    html+=`<div class="timefill" style="grid-row:2 / ${rows+2}"></div>`;

    day.sessions.forEach(ev=>{
      if(hidden.has(ev.stage)&&!ev.key)return;
      const col=ev.key?`2 / -1`:`${colIndex[ev.stage]}`;
      if(!ev.key&&col==="undefined")return;
      html+=`<div class="ev ${ev.key?'key':''} ${ev.venue?'venue':''}" data-id="${ev._id}"
        style="grid-column:${col};grid-row:${line(ev.s)} / ${line(ev.e)};--c:${cv(ev.stage)}">
        <span class="etime">${fmtRange(ev.s,ev.e)}</span>
        <span class="eorg">${ev.org}</span><h3>${ev.title}</h3></div>`;
    });

    tt.innerHTML=html;wrap.appendChild(tt);sec.appendChild(wrap);app.appendChild(sec);
  });

  document.querySelectorAll("[data-id]").forEach(el=>{
    el.addEventListener("click",()=>openSheet(+el.getAttribute("data-id")));
  });
}

/* ---------- Bottom sheet ---------- */
const scrim=document.getElementById("scrim"),sheet=document.getElementById("sheet"),
      body=document.getElementById("sheetBody");
function openSheet(id){
  const x=ALL[id];if(!x)return;
  const stage=x.stage||"venue";const color=cv(stage);
  const time = x.t ? x.t : `${fmt(x.s)} – ${fmt(x.e)}`;
  const stageLabel = (STAGES[stage]||STAGES.venue).label + (x._pre?"":t("stageSuffix"));
  const tags=[];
  if(x.theme)tags.push(`<span class="theme">${x.theme}</span>`);
  (x.topics||[]).forEach(tp=>tags.push(`<span>${tp}</span>`));
  const spk=(x.spk||[]).map(p=>`<div class="spk">
      <div class="av" style="background:${color}">${initials(p.n)}</div>
      <div><div class="nm">${p.n}</div><div class="rl">${p.r}</div></div></div>`).join("");
  const meta=EXTRA[x.title];
  const url=sessionUrl(x);
  const descEn = x.descEn || (meta&&meta.de) || "";
  const descJa = x.desc   || (meta&&meta.d)  || "";
  const desc = lang==="en" ? (descEn || descJa) : (descJa || descEn);
  body.innerHTML=`
    <div class="s-stage" style="--c:${color}"><span class="dot"></span>${stageLabel}</div>
    <p class="s-time">${time}</p>
    <h2 id="sheetTitle">${x.title}</h2>
    ${tags.length?`<div class="s-tags">${tags.join("")}</div>`:""}
    ${desc?`<p class="s-summary-label">${t("summaryLabel")}</p><p class="s-desc">${desc}</p>`
          :(url?`<p class="s-note">${t("noSummary")}</p>`:"")}
    ${spk?`<p class="s-sec">${t("speakersLabel")}</p>${spk}`:""}
    ${url?`<a class="s-link" href="${url}" target="_blank" rel="noopener">${t("officialLink")}</a>`:""}
  `;
  sheet.style.setProperty("--c",color);
  scrim.classList.add("open");sheet.classList.add("open");
  document.body.style.overflow="hidden";
}
function closeSheet(){scrim.classList.remove("open");sheet.classList.remove("open");
  document.body.style.overflow="";}
scrim.addEventListener("click",closeSheet);
document.getElementById("sheetClose").addEventListener("click",closeSheet);
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeSheet();});

function applyLang(){
  document.documentElement.lang = lang;
  document.title = t("docTitle");
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  document.querySelectorAll("[data-i18n-aria]").forEach(el=>{
    el.setAttribute("aria-label", t(el.dataset.i18nAria));
  });
  document.querySelectorAll("#langToggle .opt").forEach(el=>{
    el.classList.toggle("on", el.dataset.opt === lang);
  });
  render();
}

document.getElementById("langToggle").addEventListener("click",()=>{
  lang = (lang === "en") ? "ja" : "en";
  try { localStorage.setItem("lang", lang); } catch(e){}
  applyLang();
});

buildLegend();
applyLang();
</script>
